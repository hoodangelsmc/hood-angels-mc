    <style>
        body {
            background-color: #000;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 8rem;
            padding-top: 8rem;
        }

        .gallery-header h1 {
            font-size: 5rem;
            letter-spacing: 10px;
            margin-bottom: 1rem;
        }

        .gallery-header p {
            color: var(--text-dim);
            letter-spacing: 3px;
            font-size: 1rem;
        }

        .gallery-container {
            column-count: 3;
            column-gap: 1.5rem;
            padding-bottom: 8rem;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            background: #0a0a0a;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .gallery-item img {
            width: 100%;
            display: block;
            filter: contrast(1.1) brightness(0.7);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-item:hover img {
            filter: contrast(1.2) brightness(1);
            transform: scale(1.05);
        }

        .gallery-item::after {
            content: 'VIEW';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Hessian', serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            opacity: 0;
            transition: var(--transition);
            z-index: 2;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        .gallery-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            transition: var(--transition);
            z-index: 1;
        }

        .gallery-item:hover::before {
            opacity: 1;
        }

        /* Lightbox */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            filter: contrast(1.1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .close-lightbox {
            position: absolute;
            top: 40px;
            right: 40px;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            font-family: serif;
        }

        @media (max-width: 1024px) {
            .gallery-container { column-count: 2; }
        }

        @media (max-width: 768px) {
            .gallery-container { column-count: 1; }
            .gallery-header h1 { font-size: 3.5rem; }
        }
    </style>

</head>
<body>

    <main class="container">
        <div class="gallery-header">
            <h1 class="reveal">GALERİ</h1>
            <p class="reveal">Karanlık Sokaklardan Kareler</p>
        </div>

        <div class="gallery-container" id="gallery-wrapper">
            <!-- Fotoğraflar JS ile yüklenecek -->
        </div>  
    </main>

    <!-- Admin Ekleme Butonu (Sadece giriş yapılmışsa görünecek) -->
    <a href="admin/dashboard.php" id="admin-add-btn" style="display: none; position: fixed; bottom: 40px; right: 40px; width: 70px; height: 70px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; text-decoration: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 2100; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);">
        +
    </a>

    <div id="lightbox">
        <span class="close-lightbox">&times;</span>
        <div style="text-align: center; width: 100%;">
            <img id="lightbox-img" src="" alt="Full View">
            <div id="lightbox-info" style="margin-top: 2rem; color: #fff; font-family: 'Hessian', serif;">
                <h3 id="lightbox-title" style="font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 0.5rem;"></h3>
                <p id="lightbox-date" style="color: #888; letter-spacing: 3px; font-size: 1rem;"></p>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">

        </div>
    </footer>

    <script>
        // Galeri verilerini yükle
        async function loadGallery() {
            try {
                const response = await fetch('assets/gallery_data.json');
                const data = await response.json();
                const wrapper = document.getElementById('gallery-wrapper');
                
                wrapper.innerHTML = '';
                
                data.forEach(item => {
                    const galleryItem = document.createElement('div');
                    galleryItem.className = 'gallery-item reveal';
                    galleryItem.innerHTML = `<img src="${item.src}" alt="${item.title}" data-title="${item.title}" data-date="${item.date}">`;
                    
                    galleryItem.addEventListener('click', () => {
                        openLightbox(item.src, item.title, item.date);
                    });
                    
                    wrapper.appendChild(galleryItem);
                });

                // Intersection Observer'ı yeniden başlat (animations.js içindeki observer'ı tetikler)
                if (window.observer) {
                    document.querySelectorAll('.reveal').forEach(el => window.observer.observe(el));
                } else {
                    // Fallback
                    const localObserver = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) entry.target.classList.add('visible');
                        });
                    }, { threshold: 0.1 });
                    document.querySelectorAll('.reveal').forEach(el => localObserver.observe(el));
                }

            } catch (error) {
                console.error("Galeri yüklenirken hata:", error);
            }
        }

        // Admin kontrolü
        async function checkAdmin() {
            try {
                const response = await fetch('admin/check_auth.php');
                const data = await response.json();
                if (data.logged_in) {
                    document.getElementById('admin-add-btn').style.display = 'flex';
                } else {
                    document.getElementById('admin-add-btn').style.display = 'none';
                }
            } catch (e) {
                document.getElementById('admin-add-btn').style.display = 'none';
            }
        }

        // Lightbox logic
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxTitle = document.getElementById('lightbox-title');
        const lightboxDate = document.getElementById('lightbox-date');
        const closeBtn = document.querySelector('.close-lightbox');

        function openLightbox(src, title, date) {
            lightboxImg.src = src;
            lightboxTitle.textContent = title || "";
            lightboxDate.textContent = date || "";
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        closeBtn.addEventListener('click', () => {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto';
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target.parentElement === lightbox) closeBtn.click();
        });

        // Başlat
        loadGallery();
        checkAdmin();

        // Admin butonu hover animasyonu
        const adminBtn = document.getElementById('admin-add-btn');
        adminBtn.onmouseover = () => { adminBtn.style.transform = 'scale(1.1) translateY(-5px)'; adminBtn.style.boxShadow = '0 15px 40px rgba(255,255,255,0.1)'; };
        adminBtn.onmouseout = () => { adminBtn.style.transform = 'scale(1) translateY(0)'; adminBtn.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)'; };

    </script>
