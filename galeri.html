<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri | Scorpion MC</title>
    <link rel="stylesheet" href="./assets/mobile.css">
    <link rel="stylesheet" href="./assets/animations.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

        :root {
            --bg-dark: #050505;
            --accent: #ffffff;
            --text-dim: #888;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        /* Nav */
        #main-nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            transition: var(--transition);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Hessian', serif;
            font-size: 1.8rem;
            letter-spacing: 5px;
            text-decoration: none;
            color: #fff;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .nav-links a:hover, .nav-links a.active {
            color: #fff;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 5rem;
            padding-top: 10rem;
        }

        .gallery-header h1 {
            font-family: 'Hessian', serif;
            font-size: 5rem;
            letter-spacing: 15px;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gallery-header p {
            color: var(--text-dim);
            letter-spacing: 5px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* Masonry Layout */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            column-count: 3;
            column-gap: 2rem;
            padding: 0 2rem 10rem 2rem;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            background: #111;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 4px;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            filter: contrast(1.1) brightness(0.8) grayscale(0.3);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gallery-item:hover img {
            filter: contrast(1.2) brightness(1) grayscale(0);
            transform: scale(1.03);
        }

        .gallery-item::after {
            content: 'GÖRÜNTÜLE';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 5px;
            opacity: 0;
            transition: var(--transition);
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        .gallery-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            transition: var(--transition);
            z-index: 1;
        }

        .gallery-item:hover::before {
            opacity: 1;
        }

        /* Lightbox */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 40px;
            backdrop-filter: blur(20px);
        }

        #lightbox img {
            max-width: 90%;
            max-height: 80vh;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            filter: contrast(1.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .close-lightbox {
            position: absolute;
            top: 40px;
            right: 40px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }

        #lightbox-info {
            position: absolute;
            bottom: 40px;
            text-align: center;
            width: 100%;
            color: #fff;
        }

        #lightbox-title {
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        #lightbox-date {
            color: #666;
            letter-spacing: 3px;
            font-size: 0.8rem;
        }

        @media (max-width: 1024px) {
            .gallery-container { column-count: 2; }
        }

        @media (max-width: 768px) {
            .gallery-container { column-count: 1; padding: 0 1rem 5rem 1rem; }
            .gallery-header h1 { font-size: 3rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <nav id="main-nav">
        <div class="nav-content">
            <a href="index.html" class="logo">SCORPION MC</a>
            <ul class="nav-links">
                <li><a href="index.html">Hakkımızda</a></li>
                <li><a href="galeri.html" class="active">Galeri</a></li>
                <li><a href="ekip.html">Ekip</a></li>
                <li><a href="hikaye.html">Hikaye</a></li>
                <li><a href="thec.html">TheC</a></li>
                <li><a href="tuzuk.html">Tüzük</a></li>
                <li><a href="iletisim.html">İletişim</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="gallery-header">
            <h1 class="reveal">GALERİ</h1>
            <p class="reveal">Karanlık Sokaklardan Kareler</p>
        </div>

        <div class="gallery-container" id="gallery-wrapper">
            <!-- Fotoğraflar JS ile yüklenecek -->
        </div>  
    </main>

    <!-- Admin + Butonu -->
    <a href="admin/index.html" id="admin-add-btn" style="display:none;position:fixed;bottom:40px;right:40px;width:70px;height:70px;background:#fff;color:#000;border-radius:50%;align-items:center;justify-content:center;font-size:3rem;text-decoration:none;box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:2100;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);font-family:'Hessian',serif;line-height:1">
        +
    </a>

    <div id="lightbox">
        <span class="close-lightbox">&times;</span>
        <div style="text-align:center;width:100%">
            <img id="lightbox-img" src="" alt="Full View">
            <div id="lightbox-info">
                <h3 id="lightbox-title"></h3>
                <p id="lightbox-date"></p>
            </div>
        </div>
    </div>

    <footer style="padding: 5rem 0; text-align: center; border-top: 1px solid rgba(255,255,255,0.05);">
        <div class="footer-logo" style="font-family:'Hessian',serif; font-size: 2rem; letter-spacing: 10px; margin-bottom: 1rem;">SCORPION MC</div>
        <p style="color: #444; font-size: 0.7rem; letter-spacing: 3px;">© 2025 SCORPION MC. TÜM HAKLARI SAKLIDIR.</p>
    </footer>

    <script>
        async function loadGallery() {
            const wrapper = document.getElementById('gallery-wrapper');
            try {
                const res = await fetch('https://raw.githubusercontent.com/scorpionsmc/scorpionmc/main/assets/gallery_data.json?t=' + Date.now());
                if (!res.ok) throw new Error('JSON okunamadı');
                const data = await res.json();
                wrapper.innerHTML = '';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item reveal';
                    div.innerHTML = `<img src="${item.src}" alt="${item.title || ''}">`;
                    div.addEventListener('click', () => openLightbox(item.src, item.title, item.date));
                    wrapper.appendChild(div);
                });
            } catch (e) {
                console.error('Galeri yüklenemedi:', e);
                wrapper.innerHTML = '<p style="color:#555;text-align:center;padding:4rem;letter-spacing:2px">Fotoğraflar yüklenemedi.</p>';
            }
            
            const obs = new IntersectionObserver(entries => {
                entries.forEach(en => { if (en.isIntersecting) en.target.classList.add('visible'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.gallery-item.reveal').forEach(el => obs.observe(el));

            setTimeout(() => {
                document.querySelectorAll('.gallery-item.reveal').forEach(el => {
                    if (!el.classList.contains('visible')) el.classList.add('visible');
                });
            }, 1000);
        }

        function checkAdmin() {
            if (sessionStorage.getItem('smc_admin') === '1') {
                document.getElementById('admin-add-btn').style.display = 'flex';
            }
        }

        const lightbox = document.getElementById('lightbox');
        const closeBtn = document.querySelector('.close-lightbox');

        function openLightbox(src, title, date) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox-title').textContent = title || '';
            document.getElementById('lightbox-date').textContent = date || '';
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        closeBtn.addEventListener('click', () => { lightbox.style.display = 'none'; document.body.style.overflow = 'auto'; });
        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeBtn.click(); });

        loadGallery();
        checkAdmin();
    </script>
    <script src="./assets/animations.js" defer></script>
</body>
</html>
