<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Scorpion MC</title>

  <link rel="stylesheet" href="../assets/animations.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 480px;
      animation: fadeIn .5s ease
    }

    .screen.active {
      display: block
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    h1 {
      font-family: 'Hessian', serif;
      font-size: 2.8rem;
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: .5rem
    }

    .subtitle {
      color: #666;
      text-align: center;
      letter-spacing: 2px;
      font-size: .85rem;
      margin-bottom: 3rem
    }

    .form-group {
      margin-bottom: 1.5rem
    }

    label {
      display: block;
      color: #888;
      font-size: .8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: .6rem
    }

    input[type=text],
    input[type=password],
    input[type=date],
    input[type=file] {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      outline: none;
      transition: border .3s
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.4)
    }

    input[type=file] {
      cursor: pointer
    }

    .btn {
      width: 100%;
      padding: 1.2rem;
      background: #fff;
      color: #000;
      font-family: 'Hessian', serif;
      font-size: 1.2rem;
      letter-spacing: 3px;
      border: none;
      cursor: pointer;
      transition: all .3s;
      margin-top: .5rem
    }

    .btn:hover {
      background: #ddd;
      transform: translateY(-2px)
    }

    .btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
      transform: none
    }

    .btn-outline {
      width: 100%;
      padding: 1rem;
      background: transparent;
      color: #ff4d4d;
      border: 1px solid rgba(255, 77, 77, 0.3);
      cursor: pointer;
      transition: .3s;
      margin-top: 1rem;
      letter-spacing: 2px;
    }

    .btn-outline:hover {
      background: rgba(255, 77, 77, 0.08);
      border-color: #ff4d4d;
    }

    .error {
      color: #ff4d4d;
      font-size: .85rem;
      margin-top: 1rem;
      text-align: center;
      display: none
    }

    .success {
      color: #4dff88;
      font-size: .85rem;
      margin-top: 1rem;
      text-align: center;
      display: none
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      margin: 2rem 0
    }

    .help-text {
      color: #555;
      font-size: .78rem;
      margin-top: .5rem;
      line-height: 1.6
    }

    .help-text a {
      color: #888;
      text-decoration: underline
    }

    .preview-img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      margin-bottom: 1rem;
      display: none
    }

    .progress-bar {
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      margin-top: 1.5rem;
      overflow: hidden;
      display: none
    }

    .progress-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      transition: width .3s
    }

    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 2rem
    }

    .step {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: background .3s
    }

    .step.active {
      background: #fff
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: #555;
      font-size: .8rem;
      cursor: pointer;
      letter-spacing: 2px;
      transition: color .3s
    }

    .back-link:hover {
      color: #fff
    }

    .config-summary {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      font-size: .8rem;
      color: #666;
      line-height: 1.8
    }
  </style>
</head>

<body>

  <div class="screen active" id="screen-login">

    <div class="step-indicator">
      <div class="step active"></div>
      <div class="step"></div>
      <div class="step"></div>
    </div>

    <h1>GİRİŞ</h1>
    <p class="subtitle">SCORPION MC ADMIN PANELİ</p>

    <div class="form-group">
      <label>Şifre</label>
      <input type="password" id="login-pass" placeholder="••••••••">
    </div>

    <button class="btn" onclick="doLogin()">GİRİŞ YAP</button>

    <div class="error" id="login-error">Yanlış şifre!</div>

  </div>

  <div class="screen" id="screen-config">

    <div class="step-indicator">
      <div class="step"></div>
      <div class="step active"></div>
      <div class="step"></div>
    </div>

    <h1>AYARLAR</h1>
    <p class="subtitle">BİR KERE GİRİLECEK</p>

    <div class="form-group">
      <label>Cloudinary Cloud Name</label>
      <input type="text" id="cfg-cloud">
    </div>

    <div class="form-group">
      <label>Cloudinary Upload Preset</label>
      <input type="text" id="cfg-preset">
    </div>

    <div class="form-group">
      <label>Cloudinary API Key</label>
      <input type="text" id="cfg-api-key">
    </div>

    <div class="form-group">
      <label>Cloudinary API Secret</label>
      <input type="password" id="cfg-api-secret">
    </div>

    <hr class="divider">

    <div class="form-group">
      <label>GitHub Token</label>
      <input type="password" id="cfg-token">
    </div>

    <div class="form-group">
      <label>GitHub Kullanıcı Adı</label>
      <input type="text" id="cfg-owner">
    </div>

    <div class="form-group">
      <label>GitHub Repo Adı</label>
      <input type="text" id="cfg-repo">
    </div>

    <button class="btn" onclick="saveConfig()">KAYDET VE DEVAM ET</button>

    <div class="error" id="config-error">Tüm alanları doldurun!</div>

  </div>

  <div class="screen" id="screen-upload">

    <div class="step-indicator">
      <div class="step"></div>
      <div class="step"></div>
      <div class="step active"></div>
    </div>

    <h1>FOTOĞRAF EKLE</h1>

    <p class="subtitle">GALERİYE YENİ FOTOĞRAF EKLE</p>

    <div class="config-summary" id="config-summary"></div>

    <img class="preview-img" id="preview">

    <div class="form-group">
      <label>Fotoğraf Seç</label>
      <input type="file" id="upload-file" accept="image/*" onchange="previewFile(this)">
    </div>

    <div class="form-group">
      <label>Başlık</label>
      <input type="text" id="upload-title">
    </div>

    <div class="form-group">
      <label>Tarih</label>
      <input type="date" id="upload-date">
    </div>

    <button class="btn" id="upload-btn" onclick="doUpload()">YÜKLE VE YAYINLA</button>

    <button class="btn-outline" onclick="deleteLastImage()">
      SON FOTOĞRAFI SİL
    </button>

    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="error" id="upload-error"></div>
    <div class="success" id="upload-success"></div>

  </div>

  <script>

    const ADMIN_PASS = "scorpion123";

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function doLogin() {

      const pass = document.getElementById('login-pass').value;

      if (pass === ADMIN_PASS) {

        sessionStorage.setItem('smc_admin', '1');

        const cfg = getConfig();

        if (!cfg.cloudName || !cfg.token) {
          showScreen('screen-config');
        } else {
          showUploadScreen();
        }

      } else {

        document.getElementById('login-error').style.display = 'block';

      }

    }

    function getConfig() {

      return {

        cloudName: localStorage.getItem('smc_cloud') || '',
        preset: localStorage.getItem('smc_preset') || '',
        apiKey: localStorage.getItem('smc_api_key') || '',
        apiSecret: localStorage.getItem('smc_api_secret') || '',
        token: localStorage.getItem('smc_token') || '',
        owner: localStorage.getItem('smc_owner') || '',
        repo: localStorage.getItem('smc_repo') || ''

      };

    }

    function saveConfig() {

      localStorage.setItem('smc_cloud', document.getElementById('cfg-cloud').value.trim());
      localStorage.setItem('smc_preset', document.getElementById('cfg-preset').value.trim());
      localStorage.setItem('smc_api_key', document.getElementById('cfg-api-key').value.trim());
      localStorage.setItem('smc_api_secret', document.getElementById('cfg-api-secret').value.trim());
      localStorage.setItem('smc_token', document.getElementById('cfg-token').value.trim());
      localStorage.setItem('smc_owner', document.getElementById('cfg-owner').value.trim());
      localStorage.setItem('smc_repo', document.getElementById('cfg-repo').value.trim());

      showUploadScreen();

    }

    function showUploadScreen() {

      const cfg = getConfig();

      document.getElementById('config-summary').innerHTML =
        `Cloud: ${cfg.cloudName}<br>Repo: ${cfg.owner}/${cfg.repo}`;

      document.getElementById('upload-date').value =
        new Date().toISOString().split('T')[0];

      showScreen('screen-upload');

    }

    function previewFile(input) {

      const preview = document.getElementById('preview');

      if (input.files && input.files[0]) {

        const reader = new FileReader();

        reader.onload = e => {

          preview.src = e.target.result;
          preview.style.display = 'block';

        };

        reader.readAsDataURL(input.files[0]);

      }

    }

    function setProgress(pct) {

      document.getElementById('progress-bar').style.display = 'block';

      document.getElementById('progress-fill').style.width = pct + '%';

    }

    function showMsg(type, msg) {

      const el = document.getElementById('upload-' + type);

      el.innerText = msg;

      el.style.display = 'block';

    }

    async function uploadToCloudinary(file, cloudName, preset) {

      const fd = new FormData();

      fd.append('file', file);
      fd.append('upload_preset', preset);

      const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {

        method: 'POST',
        body: fd

      });

      const data = await res.json();

      return {

        url: data.secure_url,
        public_id: data.public_id

      };

    }

    async function getGalleryData(token, owner, repo) {

      const url = `https://api.github.com/repos/${owner}/${repo}/contents/assets/gallery_data.json`;

      const res = await fetch(url, {

        headers: {
          Authorization: `token ${token}`
        }

      });

      const meta = await res.json();

      const content = JSON.parse(atob(meta.content.replace(/\n/g, '')));

      return {

        data: content,
        sha: meta.sha

      };

    }

    async function pushGalleryData(token, owner, repo, newData, sha) {

      const url = `https://api.github.com/repos/${owner}/${repo}/contents/assets/gallery_data.json`;

      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(newData, null, 2))));

      await fetch(url, {

        method: 'PUT',

        headers: {

          Authorization: `token ${token}`,
          'Content-Type': 'application/json'

        },

        body: JSON.stringify({

          message: 'Galeri güncellendi',
          content: encoded,
          sha

        })

      });

    }

    async function doUpload() {

      const file = document.getElementById('upload-file').files[0];
      const title = document.getElementById('upload-title').value.trim();
      const date = document.getElementById('upload-date').value;

      if (!file || !title || !date) {
        showMsg('error', 'Alanları doldur');
        return;
      }

      const cfg = getConfig();

      try {

        setProgress(20);

        const uploaded = await uploadToCloudinary(
          file,
          cfg.cloudName,
          cfg.preset
        );

        setProgress(50);

        const { data, sha } = await getGalleryData(
          cfg.token,
          cfg.owner,
          cfg.repo
        );

        data.unshift({

          src: uploaded.url,
          public_id: uploaded.public_id,
          title,
          date

        });

        setProgress(80);

        await pushGalleryData(
          cfg.token,
          cfg.owner,
          cfg.repo,
          data,
          sha
        );

        setProgress(100);

        showMsg('success', 'Fotoğraf yüklendi!');

      } catch (e) {

        showMsg('error', e.message);

      }

    }

    async function deleteLastImage() {

      if (!confirm("Son yüklenen fotoğraf silinsin mi?")) return;

      const cfg = getConfig();

      try {

        const { data, sha } = await getGalleryData(
          cfg.token,
          cfg.owner,
          cfg.repo
        );

        const item = data[0];

        if (!item) {
          alert("Silinecek fotoğraf yok");
          return;
        }

        // Cloudinary delete
        const timestamp = Math.floor(Date.now() / 1000);

        const str = `public_id=${item.public_id}&timestamp=${timestamp}${cfg.apiSecret}`;

        const msgUint8 = new TextEncoder().encode(str);

        const hashBuffer = await crypto.subtle.digest('SHA-1', msgUint8);

        const hashArray = Array.from(new Uint8Array(hashBuffer));

        const signature = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        const fd = new FormData();

        fd.append('public_id', item.public_id);
        fd.append('signature', signature);
        fd.append('api_key', cfg.apiKey);
        fd.append('timestamp', timestamp);

        await fetch(`https://api.cloudinary.com/v1_1/${cfg.cloudName}/image/destroy`, {

          method: 'POST',
          body: fd

        });

        // githubdan sil
        data.shift();

        await pushGalleryData(
          cfg.token,
          cfg.owner,
          cfg.repo,
          data,
          sha
        );

        alert("Fotoğraf tamamen silindi!");

        location.reload();

      } catch (err) {

        console.error(err);

        alert("Silme başarısız");

      }

    }

    window.onload = () => {

      if (sessionStorage.getItem('smc_admin') === '1') {

        showUploadScreen();

      } else {

        showScreen('screen-login');

      }

    }

  </script>

</body>

</html>
