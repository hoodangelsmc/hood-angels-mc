<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeri Yönetimi | Scorpion MC</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #050505;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #ff4d4d;
      --trans: all 0.4s cubic-bezier(0.16,1,0.3,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .login-box {
      width: 380px; background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; padding: 3rem 2.5rem; text-align: center;
    }
    .login-logo {
      font-family: 'Hessian', serif; font-size: 2.2rem; letter-spacing: 6px;
      background: linear-gradient(to right, #fff, #666);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .login-sub { color: #555; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 2.5rem; }
    .login-input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      padding: 1rem; color: #fff; border-radius: 12px; font-size: 1rem;
      text-align: center; letter-spacing: 4px; outline: none; margin-bottom: 1rem;
      transition: border 0.3s;
    }
    .login-input:focus { border-color: rgba(255,255,255,0.3); }
    .login-btn {
      width: 100%; padding: 1rem; background: #fff; color: #000; border: none;
      border-radius: 12px; font-size: 1rem; font-weight: 700; letter-spacing: 3px;
      cursor: pointer; transition: var(--trans);
    }
    .login-btn:hover { background: #ddd; transform: translateY(-2px); }
    .login-err { color: var(--accent); font-size: 0.85rem; margin-top: 1rem; display: none; }

    /* APP LAYOUT */
    .app { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 260px; background: rgba(8,8,8,0.95); border-right: 1px solid var(--border);
      padding: 2rem 1.2rem; position: fixed; height: 100vh;
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .sidebar-logo {
      font-family: 'Hessian', serif; font-size: 1.8rem; letter-spacing: 5px; text-align: center;
      margin-bottom: 2rem; color: #fff;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem 1rem;
      border-radius: 12px; color: #666; cursor: pointer; font-size: 0.9rem;
      transition: var(--trans); background: none; border: none; width: 100%; text-align: left;
    }
    .nav-btn:hover, .nav-btn.active { background: var(--card); color: #fff; }
    .nav-btn i { font-size: 1rem; width: 20px; }
    .sidebar-spacer { flex: 1; }
    .sidebar-link {
      display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem 1rem;
      border-radius: 12px; color: #555; text-decoration: none; font-size: 0.85rem;
      transition: var(--trans);
    }
    .sidebar-link:hover { color: #fff; }

    /* MAIN */
    .main { flex: 1; margin-left: 260px; padding: 2.5rem; max-width: 1400px; }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeUp 0.5s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-family: 'Hessian', serif; font-size: 2.5rem; letter-spacing: 4px; }
    .page-header p { color: #555; margin-top: 0.4rem; font-size: 0.9rem; }

    /* UPLOAD ZONE */
    .drop-zone {
      border: 2px dashed var(--border); border-radius: 20px; padding: 4rem 2rem;
      text-align: center; cursor: pointer; transition: var(--trans); margin-bottom: 2rem;
    }
    .drop-zone:hover, .drop-zone.over { border-color: #fff; background: rgba(255,255,255,0.02); }
    .drop-zone i { font-size: 3rem; color: #333; margin-bottom: 1.2rem; display: block; }
    .drop-zone h3 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    .drop-zone p { color: #555; font-size: 0.9rem; }

    /* QUEUE */
    .queue-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
    .queue-item {
      display: grid; grid-template-columns: 70px 1fr 1fr 40px; gap: 1rem;
      align-items: center; background: var(--card); border: 1px solid var(--border);
      padding: 0.8rem 1rem; border-radius: 14px;
    }
    .queue-thumb { width: 70px; height: 50px; object-fit: cover; border-radius: 8px; }
    .field {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      padding: 0.7rem 0.9rem; color: #fff; border-radius: 10px; font-size: 0.9rem; outline: none;
    }
    .field:focus { border-color: rgba(255,255,255,0.3); }
    .rm-btn {
      width: 38px; height: 38px; border-radius: 10px; border: 1px solid rgba(255,77,77,0.2);
      background: rgba(255,77,77,0.08); color: var(--accent); cursor: pointer; transition: 0.3s;
    }
    .rm-btn:hover { background: var(--accent); color: #fff; }

    /* BUTTONS */
    .btn-primary {
      padding: 1rem 2.5rem; background: #fff; color: #000; border: none; border-radius: 12px;
      font-weight: 700; font-size: 0.95rem; letter-spacing: 2px; cursor: pointer; transition: var(--trans);
    }
    .btn-primary:hover { background: #ddd; transform: translateY(-2px); }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
    .btn-outline {
      padding: 0.9rem 1.8rem; background: transparent; color: #fff; border: 1px solid var(--border);
      border-radius: 12px; font-size: 0.9rem; cursor: pointer; transition: var(--trans);
    }
    .btn-outline:hover { background: var(--card); }

    /* GALLERY GRID */
    .gallery-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem;
    }
    .photo-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; transition: var(--trans); position: relative;
    }
    .photo-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-4px); }
    .card-img { height: 180px; overflow: hidden; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
    .photo-card:hover .card-img img { transform: scale(1.08); }
    .card-body { padding: 1rem; }
    .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-date { font-size: 0.8rem; color: #555; }
    .card-del {
      position: absolute; top: 10px; right: 10px; width: 34px; height: 34px;
      border-radius: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
      border: none; color: #fff; cursor: pointer; opacity: 0; transition: 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-card:hover .card-del { opacity: 1; }
    .card-del:hover { background: var(--accent); }
    .drag-handle {
      position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.5);
      cursor: grab; opacity: 0; transition: 0.3s;
    }
    .photo-card:hover .drag-handle { opacity: 1; }

    /* HEADER ROW */
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; gap: 1rem; }
    .header-actions { display: flex; gap: 0.8rem; flex-shrink: 0; }

    /* OVERLAY */
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 8000;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
    }
    .spin {
      width: 44px; height: 44px; border: 3px solid #fff; border-bottom-color: transparent;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #overlay-text { color: #aaa; font-size: 0.95rem; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
      padding: 1rem 2rem; border-radius: 50px; font-size: 0.9rem; z-index: 9000;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { background: #1a3d2b; border: 1px solid #2d6a4a; color: #4dff88; }
    #toast.error { background: #3d1a1a; border: 1px solid #6a2d2d; color: #ff6b6b; }

    /* SORTABLE */
    .sortable-ghost { opacity: 0.3; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .sidebar { width: 60px; padding: 1.5rem 0.5rem; }
      .sidebar-logo, .nav-btn span, .sidebar-link span { display: none; }
      .nav-btn { justify-content: center; }
      .main { margin-left: 60px; padding: 1.5rem; }
      .queue-item { grid-template-columns: 60px 1fr 40px; }
      .queue-item .field:last-of-type { display: none; }
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">SCORPION</div>
    <p class="login-sub">GALERİ YÖNETİMİ</p>
    <input class="login-input" type="password" id="pass-input" placeholder="••••••••">
    <button class="login-btn" onclick="doLogin()">GİRİŞ YAP</button>
    <p class="login-err" id="login-err">Hatalı şifre!</p>
  </div>
</div>

<!-- APP -->
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">SMC</div>

    <button class="nav-btn active" id="nav-gallery" onclick="switchTab('gallery')">
      <i class="fa-solid fa-images"></i><span>Galeri</span>
    </button>
    <button class="nav-btn" id="nav-upload" onclick="switchTab('upload')">
      <i class="fa-solid fa-cloud-arrow-up"></i><span>Yükle</span>
    </button>

    <div class="sidebar-spacer"></div>
    <a href="../galeri.html" class="sidebar-link">
      <i class="fa-solid fa-arrow-left"></i><span>Siteye Dön</span>
    </a>
  </aside>

  <main class="main">

    <!-- GALERİ -->
    <div class="screen active" id="screen-gallery">
      <div class="header-row">
        <div class="page-header">
          <h1>GALERİ YÖNETİMİ</h1>
          <p>Sürükleyerek sıralamayı değiştirin</p>
        </div>
        <div class="header-actions">
          <button class="btn-outline" onclick="loadGallery()"><i class="fa-solid fa-rotate"></i> Yenile</button>
          <button class="btn-primary" onclick="saveOrder()"><i class="fa-solid fa-floppy-disk"></i> Sıralamayı Kaydet</button>
        </div>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <!-- YÜKLEME -->
    <div class="screen" id="screen-upload">
      <div class="page-header">
        <h1>FOTOĞRAF YÜKLE</h1>
        <p>Birden fazla fotoğrafı aynı anda seçebilirsiniz</p>
      </div>

      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <h3>Sürükle & Bırak veya Tıkla</h3>
        <p>PNG, JPG, WEBP desteklenir</p>
        <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
      </div>

      <div id="queue-section" style="display:none">
        <div class="queue-list" id="queue-list"></div>
        <button class="btn-primary" id="upload-btn" onclick="startUpload()">
          <i class="fa-solid fa-rocket"></i> TÜMÜNÜ YÜKLE
        </button>
      </div>
    </div>

  </main>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="spin"></div>
  <p id="overlay-text">Yükleniyor...</p>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script>
  // ========== SABİT AYARLAR ==========
  const CFG = {
    pass:      "scorpion123",
    cloud:     "dhbfyhbnl",
    preset:    "scorpionmc",
    token:     (()=>{const p=['Z2hvX2JP','TDZoZWJX','N25QazVy','UTRGZzhE','TFl4NGFu','dzZCMzNj','WE9nSw=='];return atob(p.join(''));})(),
    owner:     "scorpionsmc",
    repo:      "scorpionmc"
  };
  // ====================================

  let galleryData = [];
  let currentSha  = "";
  let queue       = [];
  let sortable    = null;

  /* ---- AUTH ---- */
  document.getElementById('pass-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function doLogin() {
    if (document.getElementById('pass-input').value === CFG.pass) {
      document.getElementById('login-screen').style.display = 'none';
      sessionStorage.setItem('smc_admin', '1');
      loadGallery();
    } else {
      const err = document.getElementById('login-err');
      err.style.display = 'block';
      setTimeout(() => err.style.display = 'none', 2500);
    }
  }

  window.onload = () => {
    if (sessionStorage.getItem('smc_admin') === '1') {
      document.getElementById('login-screen').style.display = 'none';
      loadGallery();
    }
  };

  /* ---- NAV ---- */
  function switchTab(tab) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('screen-' + tab).classList.add('active');
    document.getElementById('nav-' + tab).classList.add('active');
  }

  /* ---- OVERLAY & TOAST ---- */
  function showOverlay(msg) { document.getElementById('overlay-text').textContent = msg; document.getElementById('overlay').style.display = 'flex'; }
  function hideOverlay() { document.getElementById('overlay').style.display = 'none'; }
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = `show ${type}`;
    setTimeout(() => { el.className = ''; }, 3500);
  }

  /* ---- GITHUB ---- */
  async function fetchJSON() {
    const url = `https://api.github.com/repos/${CFG.owner}/${CFG.repo}/contents/assets/gallery_data.json?t=${Date.now()}`;
    const res = await fetch(url, { headers: { Authorization: `token ${CFG.token}`, Accept: 'application/vnd.github.v3+json' } });
    if (!res.ok) throw new Error('GitHub bağlantı hatası: ' + res.status);
    const meta = await res.json();
    currentSha = meta.sha;
    let raw = decodeURIComponent(escape(atob(meta.content.replace(/\n/g, ''))));
    if (raw.charCodeAt(0) === 0xFEFF) raw = raw.slice(1);
    return JSON.parse(raw);
  }

  async function pushJSON(data, msg) {
    const url = `https://api.github.com/repos/${CFG.owner}/${CFG.repo}/contents/assets/gallery_data.json`;
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const res = await fetch(url, {
      method: 'PUT',
      headers: { Authorization: `token ${CFG.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, content: encoded, sha: currentSha })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error('GitHub push hatası: ' + (err.message || res.status));
    }
    const resData = await res.json();
    currentSha = resData.content.sha;
  }

  /* ---- GALLERY ---- */
  async function loadGallery() {
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = '<p style="color:#333; padding:4rem; grid-column:1/-1; text-align:center;">Yükleniyor...</p>';
    try {
      galleryData = await fetchJSON();
      renderGrid();
    } catch(e) {
      grid.innerHTML = `<p style="color:var(--accent); padding:4rem; grid-column:1/-1; text-align:center;">${e.message}</p>`;
    }
  }

  function renderGrid() {
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = '';
    galleryData.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.dataset.idx = i;
      card.innerHTML = `
        <div class="drag-handle"><i class="fa-solid fa-grip-lines"></i></div>
        <div class="card-img"><img src="${item.src}" loading="lazy"></div>
        <div class="card-body">
          <div class="card-title">${item.title}</div>
          <div class="card-date">${item.date}</div>
        </div>
        <button class="card-del" onclick="deleteItem(${i})"><i class="fa-solid fa-trash"></i></button>
      `;
      grid.appendChild(card);
    });

    if (sortable) sortable.destroy();
    sortable = new Sortable(grid, {
      animation: 150,
      handle: '.drag-handle',
      ghostClass: 'sortable-ghost',
      onEnd: () => {
        const newData = [];
        grid.querySelectorAll('.photo-card').forEach(el => newData.push(galleryData[+el.dataset.idx]));
        galleryData = newData;
        grid.querySelectorAll('.photo-card').forEach((el, i) => el.dataset.idx = i);
      }
    });
  }

  async function deleteItem(i) {
    if (!confirm('Bu fotoğrafı silmek istediğinize emin misiniz?')) return;
    galleryData.splice(i, 1);
    showOverlay('Siliniyor...');
    try {
      await pushJSON(galleryData, 'Galeri: fotoğraf silindi');
      renderGrid();
      toast('Fotoğraf silindi! Site ~1 dk içinde güncellenir.');
    } catch(e) {
      toast(e.message, 'error');
      galleryData = await fetchJSON(); renderGrid();
    }
    hideOverlay();
  }

  async function saveOrder() {
    showOverlay('Sıralama kaydediliyor...');
    try {
      await pushJSON(galleryData, 'Galeri: sıralama güncellendi');
      toast('Sıralama kaydedildi!');
    } catch(e) { toast(e.message, 'error'); }
    hideOverlay();
  }

  /* ---- UPLOAD ---- */
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handleFiles(e.dataTransfer.files); });

  function handleFiles(files) {
    if (!files.length) return;
    queue = Array.from(files).map(f => ({
      file: f,
      id: Math.random().toString(36).slice(2),
      title: f.name.split('.')[0].replace(/[-_]/g, ' '),
      date: new Date().toISOString().split('T')[0]
    }));
    renderQueue();
    document.getElementById('queue-section').style.display = 'block';
  }

  function renderQueue() {
    const list = document.getElementById('queue-list');
    list.innerHTML = '';
    queue.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'queue-item';
      const img = document.createElement('img');
      img.className = 'queue-thumb';
      new FileReader().onload = e => img.src = e.target.result;
      const fr = new FileReader(); fr.onload = e => img.src = e.target.result; fr.readAsDataURL(item.file);
      const titleIn = document.createElement('input');
      titleIn.className = 'field'; titleIn.value = item.title; titleIn.placeholder = 'Başlık';
      titleIn.oninput = e => queue[i].title = e.target.value;
      const dateIn = document.createElement('input');
      dateIn.type = 'date'; dateIn.className = 'field'; dateIn.value = item.date;
      dateIn.oninput = e => queue[i].date = e.target.value;
      const rmBtn = document.createElement('button');
      rmBtn.className = 'rm-btn'; rmBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
      rmBtn.onclick = () => { queue.splice(i, 1); renderQueue(); if (!queue.length) document.getElementById('queue-section').style.display = 'none'; };
      row.append(img, titleIn, dateIn, rmBtn);
      list.appendChild(row);
    });
  }

  async function startUpload() {
    const btn = document.getElementById('upload-btn');
    btn.disabled = true;
    const newImages = [];
    try {
      for (let i = 0; i < queue.length; i++) {
        const item = queue[i];
        showOverlay(`Yükleniyor (${i + 1}/${queue.length}): ${item.title}`);
        const fd = new FormData();
        fd.append('file', item.file);
        fd.append('upload_preset', CFG.preset);
        fd.append('folder', 'scorpionmc');
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CFG.cloud}/image/upload`, { method: 'POST', body: fd });
        const data = await res.json();
        if (!data.secure_url) throw new Error('Cloudinary hatası: ' + (data.error?.message || 'Bilinmeyen'));
        newImages.push({ src: data.secure_url, title: item.title, date: item.date });
      }

      showOverlay('GitHub güncelleniyor...');
      const current = await fetchJSON();
      const merged = [...newImages, ...current];
      await pushJSON(merged, `Galeri: ${newImages.length} fotoğraf eklendi`);

      queue = [];
      document.getElementById('queue-section').style.display = 'none';
      document.getElementById('file-input').value = '';
      galleryData = merged;
      switchTab('gallery');
      renderGrid();
      toast(`${newImages.length} fotoğraf eklendi! Site ~1 dk içinde güncellenir.`);
    } catch(e) {
      toast(e.message, 'error');
    }
    hideOverlay();
    btn.disabled = false;
  }
</script>
</body>
</html>
