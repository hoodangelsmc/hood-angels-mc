<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Scorpion MC</title>
  <link rel="stylesheet" href="../assets/animations.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 500px;
      animation: fadeIn 0.5s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Hessian', serif;
      font-size: 3rem;
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #666;
      text-align: center;
      letter-spacing: 2px;
      font-size: 0.85rem;
      margin-bottom: 3rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      color: #888;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    input[type=text],
    input[type=password],
    input[type=date],
    input[type=file] {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s;
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn {
      width: 100%;
      padding: 1.2rem;
      background: #fff;
      color: #000;
      font-family: 'Hessian', serif;
      font-size: 1.2rem;
      letter-spacing: 3px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover {
      background: #ddd;
      transform: translateY(-2px);
    }

    .btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .error { color: #ff4d4d; font-size: 0.85rem; margin-top: 1rem; text-align: center; display: none; }
    .success { color: #4dff88; font-size: 0.85rem; margin-top: 1rem; text-align: center; display: none; }
    .divider { border: none; border-top: 1px solid rgba(255, 255, 255, 0.1); margin: 2rem 0; }
    
    .preview-img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      margin-bottom: 1.5rem;
      display: none;
      border-radius: 4px;
    }

    .progress-bar { height: 3px; background: rgba(255, 255, 255, 0.1); margin-top: 1rem; display: none; }
    .progress-fill { height: 100%; background: #fff; width: 0%; transition: width 0.3s; }

    .admin-gallery-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 10px;
    }

    .admin-gallery-item {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.8rem;
      border-radius: 4px;
      gap: 1rem;
    }

    .admin-gallery-item img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 4px;
    }

    .admin-gallery-item-info { flex: 1; }
    .admin-gallery-item-title { font-size: 0.85rem; color: #fff; margin-bottom: 2px; }
    .admin-gallery-item-date { font-size: 0.7rem; color: #666; }

    .delete-btn {
      background: rgba(255, 77, 77, 0.1);
      color: #ff4d4d;
      border: 1px solid rgba(255, 77, 77, 0.2);
      padding: 0.5rem 0.8rem;
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
    }

    .delete-btn:hover {
      background: #ff4d4d;
      color: #fff;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: #555;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: none;
    }
    .back-link:hover { color: #fff; }

    /* Custom Scrollbar */
    .admin-gallery-list::-webkit-scrollbar { width: 5px; }
    .admin-gallery-list::-webkit-scrollbar-track { background: transparent; }
    .admin-gallery-list::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
  </style>
</head>
<body>

  <!-- GİRİŞ EKRANI -->
  <div class="screen active" id="screen-login">
    <h1>GİRİŞ</h1>
    <p class="subtitle">SCORPION MC ADMIN</p>
    <div class="form-group">
      <label>Şifre</label>
      <input type="password" id="login-pass" placeholder="••••••••">
    </div>
    <button class="btn" onclick="doLogin()">GİRİŞ YAP</button>
    <div class="error" id="login-error">Hatalı şifre!</div>
  </div>

  <!-- AYARLAR EKRANI -->
  <div class="screen" id="screen-config">
    <h1>AYARLAR</h1>
    <p class="subtitle">SİSTEM BAĞLANTILARI</p>
    <div class="form-group">
      <label>Cloudinary Cloud Name</label>
      <input type="text" id="cfg-cloud">
    </div>
    <div class="form-group">
      <label>Cloudinary Preset (Unsigned)</label>
      <input type="text" id="cfg-preset">
    </div>
    <hr class="divider">
    <div class="form-group">
      <label>GitHub Token</label>
      <input type="password" id="cfg-token">
    </div>
    <div class="form-group">
      <label>GitHub User / Repo</label>
      <div style="display:flex; gap:10px">
        <input type="text" id="cfg-owner" placeholder="User">
        <input type="text" id="cfg-repo" placeholder="Repo">
      </div>
    </div>
    <button class="btn" onclick="saveConfig()">KAYDET VE DEVAM ET</button>
  </div>

  <!-- PANEL EKRANI -->
  <div class="screen" id="screen-upload">
    <h1>GALERİ YÖNETİMİ</h1>
    <p class="subtitle">FOTOĞRAF EKLE / SİL</p>
    
    <img class="preview-img" id="preview">

    <div class="form-group">
      <label>Fotoğraf</label>
      <input type="file" id="upload-file" accept="image/*" onchange="previewFile(this)">
    </div>
    <div class="form-group">
      <label>Başlık</label>
      <input type="text" id="upload-title" placeholder="Başlık girin...">
    </div>
    <div class="form-group">
      <label>Tarih</label>
      <input type="date" id="upload-date">
    </div>

    <button class="btn" id="upload-btn" onclick="doUpload()">YÜKLE VE YAYINLA</button>
    <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="error" id="upload-error"></div>
    <div class="success" id="upload-success"></div>

    <hr class="divider">
    <label>YÜKLÜ FOTOĞRAFLAR</label>
    <div class="admin-gallery-list" id="admin-gallery-list">
      <!-- Fotoğraflar buraya dolacak -->
    </div>

    <div style="display:flex; justify-content:space-between">
      <span class="back-link" onclick="showScreen('screen-config')">⚙ Ayarlar</span>
      <a href="../galeri.html" class="back-link">← Siteye Dön</a>
    </div>
  </div>

  <script>
    const ADMIN_PASS = "scorpion123";

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if(id === 'screen-upload') loadAdminGallery();
    }

    function getConfig() {
      return {
        cloudName: localStorage.getItem('smc_cloud') || '',
        preset: localStorage.getItem('smc_preset') || '',
        token: localStorage.getItem('smc_token') || '',
        owner: localStorage.getItem('smc_owner') || '',
        repo: localStorage.getItem('smc_repo') || ''
      };
    }

    function saveConfig() {
      localStorage.setItem('smc_cloud', document.getElementById('cfg-cloud').value.trim());
      localStorage.setItem('smc_preset', document.getElementById('cfg-preset').value.trim());
      localStorage.setItem('smc_token', document.getElementById('cfg-token').value.trim());
      localStorage.setItem('smc_owner', document.getElementById('cfg-owner').value.trim());
      localStorage.setItem('smc_repo', document.getElementById('cfg-repo').value.trim());
      showScreen('screen-upload');
    }

    function doLogin() {
      if (document.getElementById('login-pass').value === ADMIN_PASS) {
        sessionStorage.setItem('smc_admin', '1');
        const cfg = getConfig();
        if (!cfg.token) showScreen('screen-config');
        else showScreen('screen-upload');
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }

    function previewFile(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => { 
          document.getElementById('preview').src = e.target.result; 
          document.getElementById('preview').style.display = 'block'; 
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function showMsg(type, msg) {
      const el = document.getElementById('upload-' + type);
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    async function getGalleryData(token, owner, repo) {
      const url = `https://api.github.com/repos/${owner}/${repo}/contents/assets/gallery_data.json?t=${Date.now()}`;
      const res = await fetch(url, { 
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' } 
      });
      if (!res.ok) throw new Error('GitHub Hatası');
      const meta = await res.json();
      let rawContent = decodeURIComponent(escape(atob(meta.content.replace(/\n/g, ''))));
      
      // UTF-8 BOM (ï»¿) temizleme koruması
      if (rawContent.charCodeAt(0) === 0xFEFF) {
        rawContent = rawContent.slice(1);
      }
      
      const content = JSON.parse(rawContent);
      return { data: content, sha: meta.sha };
    }

    async function pushGalleryData(token, owner, repo, newData, sha, action) {
      const url = `https://api.github.com/repos/${owner}/${repo}/contents/assets/gallery_data.json`;
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(newData, null, 2))));
      const res = await fetch(url, {
        method: 'PUT',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `Galeri güncellendi (${action})`, content: encoded, sha })
      });
      if (!res.ok) throw new Error('Push Hatası');
    }

    async function doUpload() {
      const file = document.getElementById('upload-file').files[0];
      const title = document.getElementById('upload-title').value;
      const date = document.getElementById('upload-date').value;
      if(!file || !title || !date) return alert('Tüm alanları doldurun!');

      const btn = document.getElementById('upload-btn');
      btn.disabled = true; btn.textContent = 'YÜKLENİYOR...';

      try {
        const cfg = getConfig();
        const fd = new FormData();
        fd.append('file', file); fd.append('upload_preset', cfg.preset); fd.append('folder', 'scorpionmc');
        
        const cRes = await fetch(`https://api.cloudinary.com/v1_1/${cfg.cloudName}/image/upload`, { method: 'POST', body: fd });
        const cData = await cRes.json();
        
        const { data, sha } = await getGalleryData(cfg.token, cfg.owner, cfg.repo);
        data.unshift({ src: cData.secure_url, title, date });
        await pushGalleryData(cfg.token, cfg.owner, cfg.repo, data, sha, 'ekleme');

        showMsg('success', 'Başarıyla eklendi!');
        loadAdminGallery();
      } catch (e) {
        showMsg('error', e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'YÜKLE VE YAYINLA';
      }
    }

    async function loadAdminGallery() {
      const list = document.getElementById('admin-gallery-list');
      list.innerHTML = 'Yükleniyor...';
      try {
        const cfg = getConfig();
        const { data } = await getGalleryData(cfg.token, cfg.owner, cfg.repo);
        list.innerHTML = '';
        data.forEach((item, index) => {
          const div = document.createElement('div');
          div.className = 'admin-gallery-item';
          div.innerHTML = `
            <img src="${item.src}">
            <div class="admin-gallery-item-info">
              <div class="admin-gallery-item-title">${item.title}</div>
              <div class="admin-gallery-item-date">${item.date}</div>
            </div>
            <button class="delete-btn" onclick="deleteGalleryItem(${index})">SİL</button>
          `;
          list.appendChild(div);
        });
      } catch (e) { list.innerHTML = 'Hata oluştu.'; }
    }

    async function deleteGalleryItem(index) {
      if(!confirm('Silmek istediğinize emin misiniz?')) return;
      try {
        const cfg = getConfig();
        const { data, sha } = await getGalleryData(cfg.token, cfg.owner, cfg.repo);
        data.splice(index, 1);
        await pushGalleryData(cfg.token, cfg.owner, cfg.repo, data, sha, 'silme');
        alert('Silindi!');
        loadAdminGallery();
      } catch (e) { alert('Hata!'); }
    }

    window.onload = () => {
      if (sessionStorage.getItem('smc_admin') === '1') {
        const cfg = getConfig();
        if (!cfg.token) showScreen('screen-config');
        else showScreen('screen-upload');
      }
    };
  </script>
</body>
</html>
